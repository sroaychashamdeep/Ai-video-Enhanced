version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: smart-video-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password

  redis:
    image: redis:alpine
    container_name: smart-video-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:latest
    container_name: smart-video-load-balancer
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:
